# Example Faraday runtime config — copy to faraday.yaml and edit as needed.
name: faraday-local

# Optional default query when no query is passed on the CLI (a positional query always wins).
# query: "Summarize the workspace README."

llm:
  # Active provider: openai | azure | openrouter
  provider: openai
  model: gpt-5.1
  api_key_env: OPENAI_API_KEY

  # OpenRouter example:
  # provider: openrouter
  # api_key_env: OPENROUTER_API_KEY
  # default_headers:
  #   HTTP-Referer: https://your-app.example
  #   X-Title: Faraday

  # Azure example:
  # provider: azure
  # api_key_env: AZURE_OPENAI_API_KEY
  # base_url_env: AZURE_OPENAI_BASE_URL
  # api_version: preview

  # Optional advanced settings for any OpenAI-compatible provider:
  # base_url: https://api.example.com/v1
  # default_query:
  #   api-version: 2025-01-01
  # organization: your-org
  # project: your-project
  # timeout: 60
  # max_retries: 3

backends:
  # auto | sqlite
  db: sqlite
  # auto | in-memory | none
  rag: in-memory

app:
  mode: host                # host | docker
  workspace:
    source_root: .
    # init_mode: bind       # bind | copy
    # copy_root: ./.faraday_runtime/workspace-copies
    # keep_copy: false

sandbox:
  backend: docker           # docker | modal | host | disabled
  # docker_image: faraday-code-sandbox
  workspace:
    container_path: /workspace

outputs:
  root: ./run_outputs
  # artifacts:
  #   collect_dir: ""
  #   collect_to_harbor: false
  #   harbor_dir: /logs/artifacts

storage:
  sqlite_path: ~/.faraday/faraday.db
  save_messages: true
  save_trajectory: true
  # previous_context: ""

batch:
  enabled: false
  prompts: []
  # prompts_file: ""
  max_concurrency: 1
  max_retries: 2
  retry_base_delay_seconds: 2.0
  retry_max_delay_seconds: 30.0
  retry_jitter_seconds: 0.5
  continue_on_error: false

features:
  modal: false
  exa: false
  python_science_stack: true
  cheminformatics_stack: false

# Optional list of tool modules loaded before every run (dotted names or .py paths).
# CLI --tool-module flags are appended after these.
# tool_modules:
#   - my_package.tools
#   - ./tools/scoring.py
